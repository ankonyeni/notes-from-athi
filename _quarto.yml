project:
  type: website
  output-dir: docs
  render:
    - "*.qmd"
    - "!r.qmd"

execute:
  echo: true      # show code
  eval: false     # do not run code globally
  warning: false
  message: false

website:
  description: "Notes on R, Python, programming, data standards, digital transformation, clinical trials, statistics, data visualization, and related ideas."
  site-url: https://ankonyeni.github.io/notes-from-athi
  title: "Notes from Athi"
  search: true
  navbar:
    left:
      - text: "Home"
        href: index.qmd
      - text: "Archive"
        href: archive.qmd
      - text: "About"
        href: about.qmd
    right:
      - icon: github
        href: https://github.com/ankonyeni/notes-from-athi
        aria-label: GitHub repository
      - icon: rss
        href: index.xml
        aria-label: RSS feed
  page-footer:
    left: "© 2026 Athenkosi Nkonyeni"
    right:
      - text: RSS
        href: index.xml
      - text: GitHub
        href: https://github.com/ankonyeni/notes-from-athi
format:
  html:
    theme:
      - sandstone
      - brand
    css: styles.css
    include-after-body: toc-active.html
    toc: true
    code-copy: true
    code-overflow: wrap
    open-graph: true
    twitter-card: true
    link-external-newwindow: true
